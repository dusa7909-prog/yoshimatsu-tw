<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吉松和漢日本料理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Sans TC", sans-serif; line-height: 1.6; color: #333; background-color: #f8f5f0; }
        header { background: #1a1a1a; color: #fff; padding: 1.5rem; text-align: center; }
        header h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
        header p { font-size: 1.1rem; opacity: 0.9; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .section-title { font-size: 2rem; margin: 2.5rem 0 1.5rem; color: #b32424; text-align: center; border-bottom: 2px solid #b32424; padding-bottom: 0.5rem; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin: 2rem 0; }
        .gallery img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: transform 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .gallery img:hover { transform: scale(1.05); }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.2rem; margin: 2rem 0; }
        .menu-grid img { width: 100%; height: auto; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        footer { background: #1a1a1a; color: #fff; text-align: center; padding: 1.5rem; margin-top: 4rem; }
        /* 图片放大预览 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; }
        .modal-content { margin: auto; display: block; max-width: 90%; max-height: 90%; margin-top: 2rem; }
        .close { position: absolute; top: 20px; right: 35px; color: #fff; font-size: 40px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>吉松和漢日本料理</h1>
        <p>堅持新鮮、用心料理 | 每日現做，季節限定</p>
    </header>

    <div class="container">
        <!-- 店內環境 -->
        <h2 class="section-title">店內環境</h2>
        <div class="gallery" id="environment-gallery">
            <img src="entrance.png" alt="店門口">
            <img src="interior1.jpg" alt="內部環境1">
            <img src="interior2.jpg" alt="內部環境2">
            <img src="private-room.png" alt="包廂">
            <img src="bar-counter.jpg" alt="吧台">
            <img src="dining-area.jpg" alt="用餐區">
        </div>

        <!-- 精選料理 -->
        <h2 class="section-title">精選料理</h2>
        <div class="gallery" id="food-gallery">
            <img src="aburi-roll.jpg" alt="炙燒壽司卷">
            <img src="sashimi-platter.jpg" alt="生魚片拼盤">
            <img src="tempura.jpg" alt="天婦羅">
            <img src="teppanyaki.jpg" alt="鐵板燒">
            <img src="udon.jpg" alt="手打烏龍麵">
            <img src="donburi.jpg" alt="丼飯">
            <img src="yakitori.jpg" alt="燒鳥">
            <img src="matcha-dessert.jpg" alt="抹茶甜點">
        </div>

        <!-- 菜單 -->
        <h2 class="section-title">菜單</h2>
        <div class="menu-grid" id="menu-gallery">
            <img src="menu1.jpg" alt="菜單1">
            <img src="menu2.jpg" alt="菜單2">
            <img src="menu3.jpg" alt="菜單3">
            <img src="menu4.jpg" alt="菜單4">
            <img src="menu5.jpg" alt="菜單5">
            <img src="menu6.jpg" alt="菜單6">
            <img src="menu7.jpg" alt="菜單7">
            <img src="menu8.jpg" alt="菜單8">
            <img src="menu9.jpg" alt="菜單9">
            <img src="menu10.jpg" alt="菜單10">
            <img src="menu11.jpg" alt="菜單11">
            <img src="menu12.jpg" alt="菜單12">
            <img src="menu13.jpg" alt="菜單13">
            <img src="menu14.jpg" alt="菜單14">
            <img src="menu15.jpg" alt="菜單15">
            <img src="menu16.jpg" alt="菜單16">
        </div>
    </div>

    <!-- 圖片放大預覽彈窗 -->
    <div id="myModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="img01">
    </div>

    <footer>
        <p>吉松和漢日本料理 © 2025 版權所有</p>
        <p>地址：台南市西區XX路XX號 | 電話：06-XXXXXXX | 營業時間：11:30-14:30, 17:30-22:00</p>
    </footer>

    <script>
        // 圖片放大預覽功能
        const modal = document.getElementById("myModal");
        const modalImg = document.getElementById("img01");
        const closeBtn = document.getElementsByClassName("close")[0];

        // 給所有圖片添加點擊事件
        const allImages = document.querySelectorAll(".gallery img, .menu-grid img");
        allImages.forEach(img => {
            img.onclick = function() {
                modal.style.display = "block";
                modalImg.src = this.src;
            }
        });

        // 關閉彈窗
        closeBtn.onclick = function() {
            modal.style.display = "none";
        }

        // 點擊彈窗背景關閉
        modal.onclick = function(e) {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        }
    </script>
</body>
</html>
