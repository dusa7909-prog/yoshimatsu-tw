<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吉松和漢日本料理 - 道地日式風味</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft JhengHei", sans-serif;
  }
  body {
    background: #fff;
    color: #333;
    line-height: 1.6;
  }
  /* 导航栏 */
  .nav-top {
    width: 100%;
    background: #000;
    padding: 12px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 999;
  }
  .nav-top a {
    color: #fff;
    text-decoration: none;
    margin: 0 15px;
    font-size: 15px;
    letter-spacing: 1px;
  }
  /* Banner 大图 - 这里已经确认是 entrance.png */
  .hero-banner {
    width: 100%;
    height: auto;
  }
  .hero-banner img {
    width: 100%;
    height: auto;
    display: block;
  }
  /* 最新消息板块 */
  .news-section {
    background: #fdf9f5;
    padding: 40px 20px;
    text-align: center;
  }
  .news-section h3 {
    font-size: 22px;
    color: #c82829;
    margin-bottom: 15px;
    letter-spacing: 2px;
  }
  .news-section p {
    font-size: 16px;
    margin-bottom: 10px;
  }
  /* 品牌理念 */
  .brand-section {
    padding: 60px 20px;
    max-width: 1000px;
    margin: 0 auto;
    text-align: center;
  }
  .brand-section h2 {
    font-size: 28px;
    margin-bottom: 25px;
    letter-spacing: 3px;
  }
  .brand-slogan {
    font-size: 18px;
    line-height: 1.8;
    max-width: 700px;
    margin: 0 auto;
  }
  /* 招牌料理展示 */
  .food-section {
    background: #f8f8f8;
    padding: 60px 20px;
  }
  .food-section h2 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 30px;
    letter-spacing: 3px;
  }
  .food-grid {
    max-width: 1000px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
  }
  .food-grid img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 8px;
  }
  /* 完整菜单板块 */
  .menu-section {
    padding: 60px 20px;
    max-width: 1200px;
    margin: 0 auto;
    text-align: center;
  }
  .menu-section h2 {
    font-size: 28px;
    margin-bottom: 40px;
    letter-spacing: 3px;
  }
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
  }
  .menu-grid img {
    width: 100%;
    height: auto;
    border-radius: 8px;
    border: 1px solid #eee;
  }
  /* 订位板块 */
  .reserve-section {
    padding: 40px 20px;
    text-align: center;
    background: #000;
    color: #fff;
  }
  .reserve-section a {
    display: inline-block;
    background: #c82829;
    color: #fff;
    padding: 12px 30px;
    border-radius: 4px;
    text-decoration: none;
    margin-top: 20px;
    font-weight: bold;
  }
  /* 底部信息 */
  .footer {
    padding: 30px 20px;
    text-align: center;
    font-size: 15px;
  }
</style>
</head>
<body>

  <div class="nav-top">
    <a href="#home">首頁</a>
    <a href="#food">招牌料理</a>
    <a href="#menu">線上菜單</a>
    <a href="#reserve">訂位</a>
    <a href="#contact">資訊</a>
  </div>

  <!-- 1. 大门图 - 已经确认叫 entrance.png -->
  <div class="hero-banner" id="home">
    <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/entrance.png" alt="吉松和漢日本料理">
  </div>

  <div class="brand-section">
    <h2>本物の味</h2>
    <p class="brand-slogan">
      堅持新鮮食材，道地日式風味，<br>
      吉松和漢，予你最真實的日本料理體驗。
    </p>
  </div>

  <!-- 2. 招牌料理 (4張) -->
  <div class="food-section" id="food">
    <h2>招牌料理</h2>
    <div class="food-grid">
      <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/otoro.jpg" alt="大腹">
      <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/uni.jpg" alt="海膽">
      <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/sashimi-platter.jpg" alt="生魚片">
      <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/aburi-roll.jpg" alt="炙壽司">
    </div>
  </div>

  <!-- 3. 完整菜单 (menu_01 到 menu_09) -->
  <div class="menu-section" id="menu">
    <h2>完整菜單</h2>
    <div class="menu-grid">
      <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/menu_01.png" alt="菜單1">
      <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/menu_02.png" alt="菜單2">
      <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/menu_03.png" alt="菜單3">
      <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/menu_04.png" alt="菜單4">
      <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/menu_05.png" alt="菜單5">
      <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/menu_06.png" alt="菜單6">
      <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/menu_07.png" alt="菜單7">
      <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/menu_08.png" alt="菜單8">
      <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/menu_09.png" alt="菜單9">
    </div>
  </div>

  <!-- 4. 订位 -->
  <div class="reserve-section" id="reserve">
    <h3>線上訂位</h3>
    <p>炙烤鮮美，本味相迎，吉松期待與你相遇</p>
    <a href="tel:0225230333">立即預約 | 02-25230333</a>
  </div>

  <!-- 5. 底部 -->
  <div class="footer" id="contact">
    <p>吉松和漢日本料理</p>
    <p>📞 電話：02-25230333</p>
    <p>📍 地址：台北市中山區中山北路二段50巷15號</p>
  </div>

</body>
</html>
