<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>吉松和漢日本料理</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft JhengHei", sans-serif;
  }
  body {
    background: #fdfbf8;
    color: #333;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* 頂部導覽 */
  header {
    background: #1a1a1a;
    padding: 14px 0;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 999;
    width: 100%;
  }
  header a {
    color: #fff;
    margin: 0 10px;
    text-decoration: none;
    font-size: 14px;
    padding: 4px 8px;
    display: inline-block;
  }

  /* 首屏大圖 */
  .hero {
    width: 100%;
    height: auto;
    max-height: 460px;
    overflow: hidden;
  }
  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* 內容容器 */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 15px;
  }

  /* 標題樣式 */
  .section-title {
    text-align: center;
    font-size: 22px;
    color: #a00000;
    margin: 30px 0 20px;
  }
  .section-title::after {
    content: "";
    display: block;
    width: 40px;
    height: 2px;
    background: #a00000;
    margin: 8px auto;
  }

  /* 環境/料理網格 */
  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
    grid-auto-flow: row;
    grid-auto-rows: 180px;
  }
  .grid-3 img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 6px;
    cursor: zoom-in;
    transition: transform 0.2s ease;
  }

  /* ✅ 菜單專用：長條垂直 + 每張之間留間隔 + 白色底邊框，看起來是一張一張 */
  .menu-list {
    display: flex;
    flex-direction: column;
    gap: 25px; /* 關鍵：每張菜單之間的間隔 */
    margin-bottom: 30px;
  }
  .menu-list img {
    width: 100%;
    height: auto;
    border-radius: 8px;
    border: 1px solid #eee;
    background: #fff; /* 白色底，讓每張菜單更獨立 */
    padding: 8px; /* 內邊距，讓圖片不會貼到邊框 */
    cursor: zoom-in;
    transition: transform 0.2s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05); /* 輕微陰影，強化「一張紙」的感覺 */
  }

  /* 圖片放大遮罩層 */
  .image-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    padding: 20px;
  }
  .image-modal img {
    max-width: 95%;
    max-height: 95%;
    border-radius: 8px;
    cursor: zoom-in;
  }

  /* 底部資訊 */
  footer {
    background: #1a1a1a;
    color: white;
    text-align: center;
    padding: 30px 15px;
    margin-top: 20px;
    font-size: 14px;
    line-height: 1.8;
  }

  /* 手機端適配 */
  @media (max-width: 768px) {
    .grid-3 {
      grid-template-columns: repeat(2, 1fr);
      grid-auto-rows: 160px;
    }
    .menu-list {
      gap: 20px; /* 手機端間隔稍微縮小 */
    }
    .menu-list img {
      padding: 6px;
    }
    .hero {
      max-height: 280px;
    }
    header a {
      margin: 0 6px;
      font-size: 13px;
    }
  }

  @media (max-width: 480px) {
    .grid-3 {
      grid-template-columns: 1fr;
      grid-auto-rows: 200px;
    }
    .section-title {
      font-size: 20px;
    }
  }
</style>
</head>

<!-- 圖片放大彈窗 -->
<div class="image-modal" id="imageModal" onclick="closeModal()">
  <img id="modalImage" src="" alt="放大查看">
</div>

<script>
  function openModal(imageSrc) {
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    modal.style.display = 'flex';
    modalImg.src = imageSrc;
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    const modal = document.getElementById('imageModal');
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });
</script>
