<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 关键1：移动端视口适配，解决手机端样式错乱 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>日本料理店 - 菜单展示</title>
    <style>
        /* 基础样式 - 重置默认样式，避免浏览器差异 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .menu-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
            /* 兼容老旧浏览器不支持grid的情况 */
            display: -webkit-grid;
            -webkit-grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        }

        .menu-item {
            cursor: zoom-in;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            /* 兼容移动端点击高亮 */
            -webkit-tap-highlight-color: transparent;
        }

        .menu-item:hover {
            transform: scale(1.02);
            /* 兼容老版webkit内核 */
            -webkit-transform: scale(1.02);
        }

        .menu-item img {
            width: 100%;
            height: auto;
            display: block;
            /* 防止图片模糊 */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        /* 图片预览弹窗样式 - 兼容不同浏览器的定位 */
        .image-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: zoom-out;
            /* 兼容flex布局的老浏览器 */
            display: -webkit-flex;
            -webkit-align-items: center;
            -webkit-justify-content: center;
        }

        .preview-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            overflow: hidden;
            /* 防止移动端点击穿透 */
            pointer-events: auto;
        }

        .preview-img {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            transition: transform 0.2s;
            cursor: move;
            /* 兼容老版transform */
            -webkit-transition: -webkit-transform 0.2s;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            /* 兼容移动端点击 */
            -webkit-tap-highlight-color: transparent;
        }

        .zoom-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            -webkit-transform: translateX(-50%);
            color: white;
            font-size: 14px;
            opacity: 0.7;
        }

        /* 适配小屏手机 */
        @media (max-width: 480px) {
            .menu-gallery {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                -webkit-grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
            .close-btn {
                font-size: 24px;
                top: 15px;
                right: 15px;
            }
            .zoom-hint {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="menu-gallery">
        <div class="menu-item">
            <img src="仓库里的菜单1路径.jpg" alt="料理菜单1" data-img="仓库里的菜单1路径.jpg">
        </div>
        <div class="menu-item">
            <img src="仓库里的菜单2路径.png" alt="料理菜单2" data-img="仓库里的菜单2路径.png">
        </div>
        <div class="menu-item">
            <img src="仓库里的菜单3路径.jpg" alt="料理菜单3" data-img="仓库里的菜单3路径.jpg">
        </div>
    </div>

    <div class="image-preview" id="imagePreview">
        <span class="close-btn" id="closeBtn">&times;</span>
        <div class="preview-content" id="previewContent">
            <img src="" alt="预览图片" class="preview-img" id="previewImg">
        </div>
        <div class="zoom-hint">
            <!-- 关键2：根据设备显示不同提示文字 -->
            <span id="hintText">滚轮缩放 / 拖拽移动</span>
        </div>
    </div>

    <script>
        // 获取元素
        const menuItems = document.querySelectorAll('.menu-item');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const closeBtn = document.getElementById('closeBtn');
        const previewContent = document.getElementById('previewContent');
        const hintText = document.getElementById('hintText');

        // 缩放和拖拽相关变量
        let scale = 1;
        let isDragging = false;
        let startX, startY;
        let translateX = 0, translateY = 0;
        // 关键3：检测设备类型（移动端/PC端）
        const isMobile = /iPhone|iPad|iPod|Android|Windows Phone|BlackBerry/i.test(navigator.userAgent);

        // 初始化：根据设备切换提示文字
        if (isMobile) {
            hintText.textContent = "双指缩放 / 拖拽移动";
            previewImg.style.cursor = 'grab';
        }

        // 1. 点击/触摸打开预览（兼容移动端触摸事件）
        menuItems.forEach(item => {
            // PC端点击
            item.addEventListener('click', handleItemClick);
            // 移动端触摸（防止点击延迟）
            item.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleItemClick(e);
            }, { passive: false });
        });

        function handleItemClick(e) {
            e.stopPropagation();
            const imgSrc = e.currentTarget.querySelector('img').dataset.img;
            previewImg.src = imgSrc;
            
            // 重置缩放和偏移
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateImageTransform();
            
            imagePreview.style.display = isMobile ? '-webkit-flex' : 'flex';
            document.body.style.overflow = 'hidden';
            // 移动端禁止页面滚动
            document.body.style.touchAction = 'none';
        }

        // 2. 关闭预览（兼容多端）
        function closePreview() {
            imagePreview.style.display = 'none';
            document.body.style.overflow = 'auto';
            document.body.style.touchAction = 'auto'; // 恢复移动端滚动
        }

        // PC端关闭
        closeBtn.addEventListener('click', closePreview);
        imagePreview.addEventListener('click', (e) => {
            if (e.target === imagePreview) closePreview();
        });
        // 移动端触摸关闭
        closeBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            closePreview();
        }, { passive: false });
        // ESC键关闭（仅PC端）
        document.addEventListener('keydown', (e) => {
            if (!isMobile && e.key === 'Escape' && imagePreview.style.display !== 'none') {
                closePreview();
            }
        });

        // 3. 缩放功能（兼容PC滚轮 + 移动端双指缩放）
        // PC端滚轮缩放
        if (!isMobile) {
            previewContent.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                scale = Math.min(Math.max(0.5, scale + delta), 3);
                updateImageTransform();
            }, { passive: false });
        } else {
            // 移动端双指缩放
            let lastDistance = 0;
            previewContent.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    // 计算双指初始距离
                    lastDistance = getDistance(e.touches[0], e.touches[1]);
                }
            }, { passive: true });

            previewContent.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length === 2) {
                    // 计算双指当前距离
                    const currentDistance = getDistance(e.touches[0], e.touches[1]);
                    // 计算缩放比例
                    const scaleDelta = (currentDistance - lastDistance) / 100;
                    scale = Math.min(Math.max(0.5, scale + scaleDelta), 3);
                    lastDistance = currentDistance;
                    updateImageTransform();
                } else if (e.touches.length === 1 && isDragging) {
                    // 单指拖拽
                    translateX = e.touches[0].clientX - startX;
                    translateY = e.touches[0].clientY - startY;
                    updateImageTransform();
                }
            }, { passive: false });
        }

        // 4. 拖拽功能（兼容PC鼠标 + 移动端触摸）
        // 开始拖拽（PC+移动端）
        previewImg.addEventListener('mousedown', startDrag);
        previewImg.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startDrag(e);
        }, { passive: false });

        // 拖拽中（PC+移动端）
        document.addEventListener('mousemove', dragMove);
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            dragMove(e);
        }, { passive: false });

        // 结束拖拽（PC+移动端）
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag, { passive: true });

        function startDrag(e) {
            isDragging = true;
            // 区分鼠标和触摸事件的坐标
            const clientX = isMobile ? e.touches[0].clientX : e.clientX;
            const clientY = isMobile ? e.touches[0].clientY : e.clientY;
            startX = clientX - translateX;
            startY = clientY - translateY;
            previewImg.style.cursor = isMobile ? 'grabbing' : 'grabbing';
        }

        function dragMove(e) {
            if (!isDragging) return;
            const clientX = isMobile ? (e.touches ? e.touches[0].clientX : 0) : e.clientX;
            const clientY = isMobile ? (e.touches ? e.touches[0].clientY : 0) : e.clientY;
            translateX = clientX - startX;
            translateY = clientY - startY;
            updateImageTransform();
        }

        function endDrag() {
            isDragging = false;
            previewImg.style.cursor = isMobile ? 'grab' : 'move';
        }

        // 辅助函数：计算双指距离（移动端缩放用）
        function getDistance(touch1, touch2) {
            const x = touch2.clientX - touch1.clientX;
            const y = touch2.clientY - touch1.clientY;
            return Math.sqrt(x * x + y * y);
        }

        // 辅助函数：更新图片变换（兼容老版浏览器）
        function updateImageTransform() {
            if (isMobile) {
                previewImg.style.webkitTransform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            } else {
                previewImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            }
        }

        // 关键4：降级处理 - 如果浏览器不支持transform，禁用缩放拖拽，仅保留预览
        if (!('transform' in document.documentElement.style) && !('-webkit-transform' in document.documentElement.style)) {
            // 隐藏缩放提示
            hintText.style.display = 'none';
            // 禁用拖拽和缩放
            previewImg.style.cursor = 'default';
            // 提示用户仅可预览
            alert('你的浏览器版本较低，仅支持图片预览，暂不支持缩放和拖拽功能');
        }
    </script>
</body>
</html>
