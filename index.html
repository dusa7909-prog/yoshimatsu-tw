<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吉松和漢日本料理</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft JhengHei", sans-serif;
    scroll-padding-top: 70px;
  }
  body {
    background: #f8f8f8;
    color: #333;
  }

  /* 导航 */
  nav {
    background: #4a1a1a;
    padding: 15px 0;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 999;
  }
  nav a {
    color: white;
    margin: 0 12px;
    text-decoration: none;
    font-size: 18px;
  }
  nav a.btn-contact {
    background: #d4af37;
    color: #000;
    padding: 6px 12px;
    border-radius: 6px;
    font-weight: bold;
  }

  /* 大圖 + 中間按鈕 */
  .banner {
    position: relative;
    width: 100%;
  }
  .banner img {
    width: 100%;
    height: auto;
    display: block;
  }
  .banner-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #8c2c2c;
    color: #fff;
    padding: 14px 24px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: bold;
    text-decoration: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  /* 內容 */
  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 10px 15px 0 15px;
  }
  .section-box {
    background: white;
    padding: 30px;
    margin: 15px 0 25px 0;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  }
  .section-box h2 {
    color: #8c2c2c;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid #eee;
    font-size: 24px;
  }

  /* 料理照片 */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
    margin-top: 15px;
  }
  .photo-grid img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  /* 底部資訊 */
  .bottom-info {
    background: #8c2c2c;
    color: white;
    text-align: center;
    padding: 40px 20px;
    margin-top: 30px;
  }
  .bottom-info .logo {
    max-width: 180px;
    margin: 0 auto 20px;
    display: block;
  }
  .contact-info {
    text-align:left; 
    display:inline-block;
    font-size: 16px;
    line-height: 1.8;
  }
  .contact-info div {
    margin-bottom: 8px;
  }

  /* 二维码 */
  .qrcode-area {
    margin-top: 25px; 
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
  }
  .qrcode-item {
    text-align: center; 
    color: #fff;
  }
  .qrcode-item img {
    width: 100px; 
    height: 100px; 
    border-radius: 8px;
    display: block;
    margin: 0 auto 6px;
  }

  footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 20px 0;
    font-size: 14px;
  }

  /* 手機 */
  @media (max-width: 768px) {
    .photo-grid {
      grid-template-columns: 1fr;
    }
    .qrcode-area {
      max-width: 280px;
    }
    .qrcode-item img {
      width: 80px;
      height: 80px;
    }
  }

  /* 彈出菜單 (關鍵！你要的滑動翻頁) */
  .menu-modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 1000;
  }
  .menu-slider {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 800px;
    height: 80vh;
    overflow: hidden;
  }
  .menu-slides {
    display: flex;
    width: 100%;
    height: 100%;
    transition: transform 0.3s ease;
  }
  .menu-slides img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    flex-shrink: 0;
  }
  .close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    color: white;
    font-size: 30px;
    cursor: pointer;
  }
  .prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.3);
    color: white;
    padding: 15px;
    font-size: 20px;
    cursor: pointer;
    border: none;
    z-index: 1001;
  }
  .prev { left: 10px; }
  .next { right: 10px; }
</style>
</head>

<body>

<nav>
  <a href="#home">首頁</a>
  <a href="#dishes">料理與環境</a>
  <a href="javascript:void(0)" onclick="openMenu()">線上菜單</a>
  <a href="#contact" class="btn-contact">聯繫我們</a>
</nav>

<!-- 大門照片 + 中間按鈕 -->
<div class="banner">
  <img src="entrance.png" alt="大門">
  <a href="javascript:void(0)" onclick="openMenu()" class="banner-btn">線上菜單</a>
</div>

<div class="container">
  <div class="section-box" id="home">
    <h2>歡迎光臨</h2>
    <p>吉松和漢日本料理堅持使用新鮮食材，提供道地日式風味，讓您在台北也能品嘗到正宗日本料理。</p>
  </div>

  <div class="section-box" id="dishes">
    <h2>店內環境與招牌料理</h2>
    <div class="photo-grid">
      <img src="private-room.png">
      <img src="otoro.jpg">
      <img src="uni.jpg">
      <img src="sashimi-platter.jpg">
      <img src="aburi-roll.jpg">
      <img src="marrow-soup.jpg">
      <img src="mulletroe.jpg">
    </div>
  </div>
</div>

<!-- 底部 -->
<div class="bottom-info" id="contact">
  <img src="logo.jpg" class="logo">
  <h1>吉松和漢日本料理</h1>
  <div class="contact-info">
    <div>📞 電話：02-25230333</div>
    <div>📍 地址：10349 台北市中山區中山北路二段50巷15號</div>
    <div>⏰ 營業時間：11:30–14:00、17:00–21:00</div>
  </div>
  <div class="qrcode-area">
    <div class="qrcode-item"><img src="fb.png"><div>Facebook</div></div>
    <div class="qrcode-item"><img src="line.png"><div>LINE</div></div>
    <div class="qrcode-item"><img src="ig.png"><div>Instagram</div></div>
  </div>
</div>

<footer>
  <p>© 2026 吉松和漢日本料理 版權所有</p>
</footer>

<!-- 菜單彈窗 + 滑動翻頁 -->
<div class="menu-modal" id="menuModal">
  <div class="close-btn" onclick="closeMenu()">×</div>
  <button class="prev" onclick="prevSlide()">‹</button>
  <button class="next" onclick="nextSlide()">›</button>
  <div class="menu-slider">
    <div class="menu-slides" id="menuSlides">
      <img src="menu_01.png">
      <img src="menu_02.png">
      <img src="menu_03.png">
      <img src="menu_04.png">
      <img src="menu_05.png">
      <img src="menu_06.png">
      <img src="menu_07.png">
      <img src="menu_08.png">
      <img src="menu_09.png">
      <img src="menu_10.png">
      <img src="menu_11.png">
      <img src="menu_12.png">
      <img src="menu_13.png">
      <img src="menu_14.png">
      <img src="menu_15.png">
      <img src="menu_16.png">
    </div>
  </div>
</div>

<script>
  let current = 0;
  const total = 16;

  function openMenu() {
    document.getElementById("menuModal").style.display = "block";
  }
  function closeMenu() {
    document.getElementById("menuModal").style.display = "none";
  }
  function updateSlide() {
    const width = 100;
    document.getElementById("menuSlides").style.transform = `translateX(-${current * width}%)`;
  }
  function prevSlide() {
    if (current > 0) { current--; updateSlide(); }
  }
  function nextSlide() {
    if (current < total-1) { current++; updateSlide(); }
  }
</script>

</body>
</html>
