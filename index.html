<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吉松和漢日本料理 | Yoshimatsu Japanese Cuisine</title>
    <style>
        /* 全域樣式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Noto Sans TC", "Meiryo", "Microsoft JhengHei", sans-serif;
        }
        body {
            background-color: #f8f5f0;
            color: #5a4a3e;
            line-height: 1.6;
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        /* 導航欄 */
        .navbar {
            background: #fff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #8b5a2b;
        }
        .nav-links {
            display: flex;
            gap: 30px;
            font-size: 16px;
        }
        .nav-links a:hover {
            color: #8b5a2b;
            border-bottom: 2px solid #8b5a2b;
            transition: all 0.3s;
        }

        /* 首頁輪播 Banner */
        .hero {
            height: 600px;
            position: relative;
            overflow: hidden;
            margin-bottom: 60px;
        }
        .hero-swiper {
            width: 100%;
            height: 100%;
        }
        .hero-swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            z-index: 1;
        }
        .hero-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            color: white;
        }
        .hero-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: normal;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .hero-content p {
            font-size: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* 店家資訊區 */
        .info-section {
            max-width: 1200px;
            margin: 0 auto 80px;
            padding: 0 30px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }
        .info-card {
            text-align: center;
            padding: 20px;
            width: 250px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .info-card h3 {
            color: #8b5a2b;
            font-size: 18px;
            margin-bottom: 10px;
        }

        /* 菜單入口 */
        .menu-entrance {
            max-width: 1200px;
            margin: 0 auto 80px;
            padding: 0 30px;
            text-align: center;
        }
        .menu-entrance h2 {
            font-size: 36px;
            color: #8b5a2b;
            margin-bottom: 40px;
            font-weight: normal;
        }
        .menu-entrance-btn {
            padding: 15px 40px;
            background: #8b5a2b;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .menu-entrance-btn:hover {
            background: #6d4520;
            transform: scale(1.05);
        }

        /* 菜單彈層 */
        .menu-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            padding: 40px 20px;
            overflow-y: auto;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 36px;
            color: white;
            cursor: pointer;
            z-index: 1001;
        }
        .menu-swiper-container {
            max-width: 1000px;
            margin: 0 auto;
            height: calc(100vh - 80px);
        }
        .menu-swiper {
            width: 100%;
            height: 100%;
        }
        .menu-swiper-slide {
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        .menu-swiper-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Swiper 樣式 */
        .swiper-pagination-bullet {
            background: white;
            opacity: 0.7;
        }
        .swiper-pagination-bullet-active {
            background: #8b5a2b;
            opacity: 1;
        }
        .swiper-button-next, .swiper-button-prev {
            color: white;
        }

        /* 頁腳 */
        .footer {
            background: #5a4a3e;
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .footer p {
            margin-bottom: 10px;
        }
        .footer .domain {
            color: #d9c8b4;
            font-size: 14px;
        }

        /* 手機響應 */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 10px;
            }
            .hero {
                height: 400px;
            }
            .hero-content h1 {
                font-size: 32px;
            }
            .info-card {
                width: 100%;
            }
            .menu-swiper-container {
                height: calc(100vh - 120px);
            }
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/swiper@11/swiper-bundle.min.css" />
</head>
<body>
    <!-- 導航欄 -->
    <nav class="navbar">
        <div class="logo">吉松和漢日本料理</div>
        <div class="nav-links">
            <a href="#home">首頁</a>
            <a href="#info">店家資訊</a>
            <a href="#menu">菜單</a>
            <a href="#contact">聯繫我們</a>
        </div>
    </nav>

    <!-- 首頁輪播 -->
    <section class="hero" id="home">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>吉松和漢日本料理</h1>
            <p>職人手作，蘊藏和漢交融之味</p>
        </div>
        <div class="swiper hero-swiper">
            <div class="swiper-wrapper">
                <!-- 9張核心圖片（替換為你的圖片URL） -->
                <div class="swiper-slide">
                    <img src="https://via.placeholder.com/1920x1080?text=炙燒卷" alt="日本昆布海苔比目魚鰭邊肉干貝炙燒卷">
                </div>
                <div class="swiper-slide">
                    <img src="https://via.placeholder.com/1920x1080?text=吉松門面" alt="吉松和漢日本料理店門">
                </div>
                <div class="swiper-slide">
                    <img src="https://via.placeholder.com/1920x1080?text=吉松LOGO" alt="吉松和漢日本料理LOGO">
                </div>
                <div class="swiper-slide">
                    <img src="https://via.placeholder.com/1920x1080?text=燉黑鮪魚骨髓湯" alt="燉黑鮪魚骨髓湯">
                </div>
                <div class="swiper-slide">
                    <img src="https://via.placeholder.com/1920x1080?text=烏魚子料理" alt="烏魚子料理">
                </div>
                <div class="swiper-slide">
                    <img src="https://via.placeholder.com/1920x1080?text=日本黑鮪魚肚" alt="日本黑鮪魚肚">
                </div>
                <div class="swiper-slide">
                    <img src="https://via.placeholder.com/1920x1080?text=店內環境" alt="吉松和漢店內環境">
                </div>
                <div class="swiper-slide">
                    <img src="https://via.placeholder.com/1920x1080?text=綜合刺身" alt="綜合刺身">
                </div>
                <div class="swiper-slide">
                    <img src="https://via.placeholder.com/1920x1080?text=日本馬糞海膽" alt="日本馬糞海膽">
                </div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </section>

    <!-- 店家資訊 -->
    <section class="info-section" id="info">
        <div class="info-card">
            <h3>地址</h3>
            <p>10491臺北市中山區中山北路二段50巷15號</p>
        </div>
        <div class="info-card">
            <h3>電話</h3>
            <p>02-25230339</p>
        </div>
        <div class="info-card">
            <h3>營業時間</h3>
            <p>11:30–14:00、17:00–21:00</p>
        </div>
        <div class="info-card">
            <h3>聯絡信箱</h3>
            <p>service@yoshimatsu.tw</p>
        </div>
    </section>

    <!-- 菜單入口 -->
    <section class="menu-entrance" id="menu">
        <h2>季節菜單</h2>
        <button class="menu-entrance-btn" id="openMenuBtn">查看完整菜單</button>
        <p>堅持旬之食材，每日新鮮進貨，職人現場手作</p>
    </section>

    <!-- 菜單彈層 -->
    <div class="menu-modal" id="menuModal">
        <span class="close-modal" id="closeMenuBtn">&times;</span>
        <div class="menu-swiper-container">
            <div class="swiper menu-swiper">
                <div class="swiper-wrapper">
                    <!-- 16張菜單（替換為你的菜單URL） -->
                    <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=菜單頁1" alt="菜單頁1"></div>
                    <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=菜單頁2" alt="菜單頁2"></div>
                    <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=菜單頁3" alt="菜單頁3"></div>
                    <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=菜單頁4" alt="菜單頁4"></div>
                    <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=菜單頁5" alt="菜單頁5"></div>
                    <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=菜單頁6" alt="菜單頁6"></div>
                    <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=菜單頁7" alt="菜單頁7"></div>
                    <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=菜單頁8" alt="菜單頁8"></div>
                    <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=菜單頁9" alt="菜單頁9"></div>
                    <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=菜單頁10" alt="菜單頁10"></div>
                    <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=菜單頁11" alt="菜單頁11"></div>
                    <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=菜單頁12" alt="菜單頁12"></div>
                    <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=菜單頁13" alt="菜單頁13"></div>
                    <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=菜單頁14" alt="菜單頁14"></div>
                    <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=菜單頁15" alt="菜單頁15"></div>
                    <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=菜單頁16" alt="菜單頁16"></div>
                </div>
                <div class="swiper-pagination"></div>
                <div class="swiper-button-prev"></div>
                <div class="swiper-button-next"></div>
            </div>
        </div>
    </div>

    <!-- 頁腳 -->
    <footer class="footer" id="contact">
        <p>吉松和漢日本料理 © All Rights Reserved</p>
        <p>電話：02-25230339 | 信箱：service@yoshimatsu.tw</p>
        <p class="domain">官方網域：yoshimatsu.tw</p>
    </footer>

    <script src="https://unpkg.com/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // 首頁輪播
        const heroSwiper = new Swiper('.hero-swiper', {
            autoplay: { delay: 4000, disableOnInteraction: false },
            pagination: { el: '.swiper-pagination', clickable: true },
            loop: true,
            effect: 'fade',
            fadeEffect: { crossFade: true }
        });

        // 菜單滑動
        const menuSwiper = new Swiper('.menu-swiper', {
            pagination: { el: '.swiper-pagination', clickable: true },
            navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
            zoom: { maxRatio: 2 },
            keyboard: { enabled: true }
        });

        // 彈層控制
        const menuModal = document.getElementById('menuModal');
        const openMenuBtn = document.getElementById('openMenuBtn');
        const closeMenuBtn = document.getElementById('closeMenuBtn');

        openMenuBtn.addEventListener('click', () => {
            menuModal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        });
        closeMenuBtn.addEventListener('click', () => {
            menuModal.style.display = 'none';
            document.body.style.overflow = 'auto';
        });
        menuModal.addEventListener('click', (e) => {
            if (e.target === menuModal) {
                menuModal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && menuModal.style.display === 'block') {
                menuModal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        });
    </script>
</body>
</html>
