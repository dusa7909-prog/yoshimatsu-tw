<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <title>吉松和漢日本料理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", sans-serif;
        }
        body {
            background: #f8f5f0;
            color: #333;
        }
        header {
            background: #8c2c2c;
            color: white;
            text-align: center;
            padding: 20px 0;
        }

            margin-bottom: 10px;

        }

            background: #4a1a1a;

        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 16px;
        }
        /* 店门口大图 Banner */
        .banner {
            width: 100%;
            height: 450px;
        }
        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        section {
            background: white;
            padding: 30px;
            margin: 20px 0;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        h2 {
            color: #8c2c2c;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
            font-size: 24px;
        }
        p {
            line-height: 1.8;
            font-size: 16px;
        }
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }

</head>
