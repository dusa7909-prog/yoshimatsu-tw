<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吉松日本料理 - Yoshimatsu</title>
    <!-- 原有网站样式（保留你满意的所有排版/颜色/布局） -->
    <style>
        /* 基础全局样式（你原有满意的版本） */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Noto Sans TC", sans-serif;
        }
        body {
            background-color: #f8f5f0;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #e0d8c8;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5rem;
            color: #8b5a2b;
            margin-bottom: 10px;
        }
        h2 {
            font-size: 1.8rem;
            color: #8b5a2b;
            margin: 20px 0 15px;
            border-bottom: 1px solid #e0d8c8;
            padding-bottom: 5px;
        }
        /* 店内环境图片样式（按你要求的顺序：LOGO→原有图→补充图） */
        .environment-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .environment-item img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        /* 精选料理样式（已删除重复图片，替换为你指定的新图） */
        .food-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .food-item img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        /* 菜单图片样式（带缩放提示） */
        .menu-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .menu-img-item {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: zoom-in;
        }
        /* 菜单预览缩放功能样式（不影响原有样式） */
        #menuPreviewModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        #previewContent {
            position: relative;
            max-width: 95%;
            max-height: 95%;
        }
        #previewImg {
            max-width: 100%;
            max-height: 100%;
            cursor: move;
            transition: transform 0.1s ease;
        }
        #previewCloseBtn {
            position: absolute;
            top: -40px;
            right: 0;
            color: #ffffff;
            font-size: 36px;
            cursor: pointer;
            user-select: none;
        }
        #previewHint {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 14px;
            opacity: 0.8;
        }
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            border-top: 2px solid #e0d8c8;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部（你满意的原有内容） -->
        <header>
            <h1>吉松日本料理</h1>
            <p>吧台用餐体验 · 新鲜刺身 · 精致包厢</p>
        </header>

        <!-- 店内环境（按你要求的顺序：LOGO→原有图→补充图） -->
        <section>
            <h2>店内环境</h2>
            <div class="environment-gallery">
                <div class="environment-item">
                    <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/logo.jpg" alt="吉松LOGO">
                </div>
                <div class="environment-item">
                    <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/environment-2.jpg" alt="店内环境2">
                </div>
                <div class="environment-item">
                    <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/bar.jpg" alt="吧台场景">
                </div>
                <div class="environment-item">
                    <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/private-room-1.jpg" alt="包厢1">
                </div>
                <div class="environment-item">
                    <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/private-room-2.jpg" alt="包厢2">
                </div>
                <div class="environment-item">
                    <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/environment-6.jpg" alt="店内环境6">
                </div>
            </div>
        </section>

        <!-- 精选料理（已删除重复图片） -->
        <section>
            <h2>精选料理</h2>
            <div class="food-gallery">
                <div class="food-item">
                    <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/food-1.jpg" alt="料理1">
                </div>
                <div class="food-item">
                    <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/food-2.jpg" alt="料理2">
                </div>
                <div class="food-item">
                    <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/food-3.jpg" alt="料理3">
                </div>
                <div class="food-item">
                    <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/food-4.jpg" alt="料理4">
                </div>
                <div class="food-item">
                    <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/food-5.jpg" alt="料理5">
                </div>
                <div class="food-item">
                    <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/food-6.jpg" alt="料理6">
                </div>
            </div>
        </section>

        <!-- 菜单板块（带点击缩放功能） -->
        <section>
            <h2>料理菜单</h2>
            <div class="menu-gallery">
                <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/menu-1.jpg" alt="菜单1" class="menu-img-item" onclick="openMenuPreview('https://dusa7909-prog.github.io/yoshimatsu-tw/menu-1.jpg')">
                <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/menu-2.png" alt="菜单2" class="menu-img-item" onclick="openMenuPreview('https://dusa7909-prog.github.io/yoshimatsu-tw/menu-2.png')">
                <img src="https://dusa7909-prog.github.io/yoshimatsu-tw/menu-3.jpg" alt="菜单3" class="menu-img-item" onclick="openMenuPreview('https://dusa7909-prog.github.io/yoshimatsu-tw/menu-3.jpg')">
            </div>
        </section>

        <!-- 底部（你满意的原有内容） -->
        <footer>
            <p>吉松日本料理 © 2025 版权所有</p>
        </footer>
    </div>

    <!-- 菜单预览弹窗（缩放功能） -->
    <div id="menuPreviewModal">
        <div id="previewContent">
            <span id="previewCloseBtn">&times;</span>
            <img id="previewImg" src="" alt="菜单预览图">
            <div id="previewHint">滚轮缩放 / 拖拽查看细节</div>
        </div>
    </div>

    <!-- 菜单缩放功能脚本 -->
    <script>
        let menuScale = 1;
        let menuIsDragging = false;
        let menuStartX = 0, menuStartY = 0;
        let menuX = 0, menuY = 0;

        // 打开预览
        function openMenuPreview(imgUrl) {
            const previewImg = document.getElementById('previewImg');
            menuScale = 1;
            menuX = 0;
            menuY = 0;
            previewImg.src = imgUrl;
            previewImg.style.transform = `translate(${menuX}px, ${menuY}px) scale(${menuScale})`;
            document.getElementById('menuPreviewModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        // 关闭预览
        function closeMenuPreview() {
            document.getElementById('menuPreviewModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // 绑定关闭事件
        document.getElementById('previewCloseBtn').addEventListener('click', closeMenuPreview);
        document.getElementById('menuPreviewModal').addEventListener('click', function(e) {
            if (e.target === this) closeMenuPreview();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeMenuPreview();
        });

        // 滚轮缩放
        document.getElementById('previewImg').addEventListener('wheel', function(e) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            menuScale = Math.max(0.5, Math.min(3, menuScale + delta));
            this.style.transform = `translate(${menuX}px, ${menuY}px) scale(${menuScale})`;
        });

        // 拖拽移动
        document.getElementById('previewImg').addEventListener('mousedown', function(e) {
            menuIsDragging = true;
            menuStartX = e.clientX - menuX;
            menuStartY = e.clientY - menuY;
            this.style.cursor = 'grabbing';
        });
        document.addEventListener('mousemove', function(e) {
            if (!menuIsDragging) return;
            menuX = e.clientX - menuStartX;
            menuY = e.clientY - menuStartY;
            document.getElementById('previewImg').style.transform = `translate(${menuX}px, ${menuY}px) scale(${menuScale})`;
        });
        document.addEventListener('mouseup', function() {
            menuIsDragging = false;
            document.getElementById('previewImg').style.cursor = 'move';
        });
    </script>
</body>
</html>
