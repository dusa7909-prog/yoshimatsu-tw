<!-- 预览弹窗（加到body最后） -->
<div class="preview-modal" id="previewModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 9999;">
    <div class="preview-content" style="position: relative; max-width: 90%; max-height: 90%;">
        <span class="close-btn" id="closeBtn" style="position: absolute; top: -40px; right: 0; color: white; font-size: 30px; cursor: pointer;">&times;</span>
        <img src="" alt="预览图片" class="preview-img" id="previewImg" style="max-width: 100%; max-height: 100%; cursor: move; transition: transform 0.1s ease;">
        <div style="position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); color: white; font-size: 14px;">滚轮缩放 / 拖拽移动</div>
    </div>
</div>

    const menuItems = document.querySelectorAll('.menu-item');
    const previewModal = document.getElementById('previewModal');
    const previewImg = document.getElementById('previewImg');
    const closeBtn = document.getElementById('closeBtn');

    // 点击打开预览
    menuItems.forEach(item => {
        item.addEventListener('click', () => {
            previewImg.src = item.dataset.img;
            scale = 1; x = 0; y = 0;
            previewImg.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
            previewModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        });
    });

    const closePreview = () => {
        previewModal.style.display = 'none';
        document.body.style.overflow = 'auto';
    };

    });
