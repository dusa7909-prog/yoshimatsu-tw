<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吉松和漢日本料理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,"Microsoft JhengHei",sans-serif}
body{background:#f8f5f0;color:#333}
header{background:#8c2c2c;color:white;padding:20px 0;text-align:center}
.logo{max-width:150px;margin:10px auto;display:block}
h1{font-size:24px;margin-bottom:10px}
.contact-info{font-size:14px;line-height:1.6}
nav{background:#4a1a1a;padding:10px 0;text-align:center}
nav a{color:white;margin:0 10px;text-decoration:none;font-size:15px}

/* 大門橫圖 banner */
.banner{width:100%;height:400px;position:relative}
.banner img{width:100%;height:100%;object-fit:cover}

/* 菜單滑動 */
.menu-slider{width:100%;overflow:hidden}
.menu-slider-wrapper{display:flex;overflow-x:auto;scroll-snap-type:x mandatory}
.menu-slide{flex:none;width:100%;scroll-snap-align:center}
.menu-slide img{width:100%;height:auto;display:block}

/* 照片排版 */
.core-photos{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:20px}
.core-photos img{width:100%;height:auto;border-radius:8px}

section{padding:20px;background:white;margin:20px;border-radius:10px}
footer{background:#333;color:white;text-align:center;padding:20px;font-size:14px}
</style>
</head>
