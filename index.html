<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>吉松和漢日本料理</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft JhengHei", sans-serif;
  }
  body {
    background: #fdfbf8;
    color: #333;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* 頂部導覽 */
  header {
    background: #1a1a1a;
    padding: 14px 0;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 999;
    width: 100%;
  }
  header a {
    color: #fff;
    margin: 0 10px;
    text-decoration: none;
    font-size: 14px;
    padding: 4px 8px;
    display: inline-block;
  }

  /* 首屏大圖 */
  .hero {
    width: 100%;
    height: auto;
    max-height: 460px;
    overflow: hidden;
  }
  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* 內容容器 */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 15px;
  }

  /* 標題樣式 */
  .section-title {
    text-align: center;
    font-size: 22px;
    color: #a00000;
    margin: 30px 0 20px;
  }
  .section-title::after {
    content: "";
    display: block;
    width: 40px;
    height: 2px;
    background: #a00000;
    margin: 8px auto;
  }

  /* 環境/料理網格：保證替換照片不亂版 */
  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .grid-3 img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 6px;
    cursor: zoom-in;
    transition: transform 0.2s ease;
  }

  /* 菜單專用：垂直排版+間隔 */
  .menu-list {
    display: flex;
    flex-direction: column;
    gap: 25px;
    margin-bottom: 30px;
  }
  .menu-list img {
    width: 100%;
    height: auto;
    border-radius: 8px;
    border: 1px solid #eee;
    background: #fff;
    padding: 8px;
    cursor: zoom-in;
    transition: transform 0.2s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }

  /* 圖片放大彈窗：手機/電腦都能縮放拖拽 */
  .image-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    padding: 20px;
    touch-action: manipulation;
  }
  .modal-content {
    max-width: 95%;
    max-height: 95%;
    border-radius: 8px;
    cursor: grab;
    user-select: none;
  }
  .modal-content.grabbing {
    cursor: grabbing;
  }

  /* 底部資訊 */
  footer {
    background: #1a1a1a;
    color: white;
    text-align: center;
    padding: 30px 15px;
    margin-top: 20px;
    font-size: 14px;
    line-height: 1.8;
  }

  /* 手機端適配 */
  @media (max-width: 768px) {
    .grid-3 {
      grid-template-columns: repeat(2, 1fr);
    }
    .grid-3 img {
      height: 160px;
    }
    .menu-list {
      gap: 20px;
    }
    .menu-list img {
      padding: 6px;
    }
    .hero {
      max-height: 280px;
    }
    header a {
      margin: 0 6px;
      font-size: 13px;
    }
  }

  @media (max-width: 480px) {
    .grid-3 {
      grid-template-columns: 1fr;
    }
    .grid-3 img {
      height: 180px;
    }
    .section-title {
      font-size: 20px;
    }
  }
</style>
</head>

<body>
<header>
  <a href="#home">首頁</a>
  <a href="#env">環境</a>
  <a href="#food">料理</a>
  <a href="#menu">菜單</a>
  <a href="#contact">聯絡我們</a>
