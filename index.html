<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吉松和漢日本料理</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft JhengHei", sans-serif;
  }
  body {
    background: #fdfbf8;
    color: #333;
    line-height: 1.7;
  }

  header {
    background: #1a1a1a;
    padding: 14px 0;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 999;
  }
  header a {
    color: #fff;
    margin: 0 12px;
    text-decoration: none;
    font-size: 15px;
  }

  .hero {
    width: 100%;
    height: 460px;
    overflow: hidden;
  }
  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  .section-title {
    text-align: center;
    font-size: 24px;
    color: #a00000;
    margin: 50px 0 25px;
  }
  .section-title::after {
    content: "";
    display: block;
    width: 50px;
    height: 2px;
    background: #a00000;
    margin: 8px auto;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .grid-3 img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 6px;
  }

  .grid-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .grid-4 img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 6px;
  }

  footer {
    background: #1a1a1a;
    color: white;
    text-align: center;
    padding: 40px 20px;
    margin-top: 40px;
  }
</style>
</head>
