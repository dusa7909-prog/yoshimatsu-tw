<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吉松和漢日本料理</title>
<style>
body { margin: 0; padding: 0; font-family: sans-serif; }
img { max-width: 100%; height: auto; }
.container { width: 100%; max-width: 800px; margin: 0 auto; padding: 10px; }
.section { margin: 20px 0; }
h2 { text-align: center; margin: 30px 0 10px; }
.img-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}
.img-grid img {
  width: 100%;
  border-radius: 6px;
  cursor: pointer;
}
/* 點圖放大視窗 */
#imgViewer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
#imgViewer.show { display: flex; }
#imgViewer img { max-width: 95%; max-height: 95%; }
</style>
</head>
<body>

<div class="container">
  <h1 style="text-align:center;">吉松和漢日本料理</h1>

  <!-- 環境 -->
  <div class="section">
    <h2>店內環境</h2>
    <div class="img-grid" id="envGallery">
      <img src="logo.jpg" alt="LOGO">
      <img src="env1.jpg" alt="環境1">
      <img src="bar.jpg" alt="吧台">
      <img src="room1.jpg" alt="包廂1">
      <img src="room2.jpg" alt="包廂2">
      <img src="env6.jpg" alt="環境6">
    </div>
  </div>

  <!-- 料理 -->
  <div class="section">
    <h2>精選料理</h2>
    <div class="img-grid" id="foodGallery">
      <img src="food1.jpg" alt="料理1">
      <img src="food2.jpg" alt="料理2">
      <img src="food3.jpg" alt="料理3">
      <img src="food4.jpg" alt="料理4">
      <img src="food5.jpg" alt="料理5">
      <img src="food6.jpg" alt="料理6">
      <img src="food7.jpg" alt="料理7">
      <img src="food8.jpg" alt="料理8">
      <img src="food9.jpg" alt="料理9">
      <img src="food10.jpg" alt="料理10">
      <img src="food11.jpg" alt="料理11">
      <img src="food12.jpg" alt="料理12">
      <img src="food13.jpg" alt="料理13">
      <img src="food14.jpg" alt="料理14">
      <img src="food15.jpg" alt="料理15">
    </div>
  </div>

  <!-- 菜單 -->
  <div class="section">
    <h2>菜單</h2>
    <div class="img-grid" id="menuGallery">
      <img src="menu1.jpg" alt="菜單1">
      <img src="menu2.jpg" alt="菜單2">
      <img src="menu3.jpg" alt="菜單3">
    </div>
  </div>
</div>

<!-- 圖片檢視器 -->
<div id="imgViewer" onclick="closeViewer()">
  <img id="viewImg">
</div>

<script>
const viewer = document.getElementById('imgViewer');
const viewImg = document.getElementById('viewImg');

// 幫所有圖片加上點擊放大
document.querySelectorAll('img').forEach(img => {
  img.onclick = () => {
    viewImg.src = img.src;
    viewer.classList.add('show');
  };
});

function closeViewer() {
  viewer.classList.remove('show');
}
</script>

</body>
</html>
